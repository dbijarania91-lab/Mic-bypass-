name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Unzip project
      run: |
        unzip MicBypass_SourceCode_v2.zip
        ls -la MicBypass/

    - name: Download gradle wrapper jar
      run: |
        mkdir -p MicBypass/gradle/wrapper
        curl -L "https://github.com/gradle/gradle/raw/v8.0.0/gradle/wrapper/gradle-wrapper.jar" \
          -o MicBypass/gradle/wrapper/gradle-wrapper.jar
        echo "Wrapper jar size: $(wc -c < MicBypass/gradle/wrapper/gradle-wrapper.jar) bytes"

    - name: Make gradlew executable
      run: chmod +x MicBypass/gradlew

    - name: Build debug APK
      run: |
        cd MicBypass
        ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MicBypass-APK
        path: MicBypass/app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
