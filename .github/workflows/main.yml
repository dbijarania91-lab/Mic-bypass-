name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: List files (debug)
      run: ls -la

    - name: Unzip project
      run: |
        unzip MicBypass_SourceCode.zip
        echo "--- After unzip ---"
        ls -la
        echo "--- Inside MicBypass ---"
        ls -la MicBypass/

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Fix gradle wrapper properties
      run: |
        cd MicBypass
        mkdir -p gradle/wrapper
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF

    - name: Make gradlew executable
      run: chmod +x MicBypass/gradlew

    - name: Build debug APK
      run: |
        cd MicBypass
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -50

    - name: Find APK
      run: find MicBypass -name "*.apk" 2>/dev/null

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MicBypass-APK
        path: MicBypass/app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
